<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover" />
    <meta name="handheldfriendly" content="true" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/png" href="/icon-192.png" sizes="192x192" />
    <link rel="icon" type="image/png" href="/icon-512.png" sizes="512x512" />
    <title>Thuisverpleging Het Verband Ternat Planner</title>

    <!-- Dark mode: pas de gekozen (of systeem-)stand meteen toe, vóór de
         eerste render, zodat er geen flits van de verkeerde kleurmodus is.
         src/utils/theme.ts bevat de volledige, herbruikbare logica. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('theme');
          var isDark = stored ? stored === 'dark' : window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', isDark);
          document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
    
    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#2563eb" />
    
    <!-- iOS / Safari Mobile Optimizations -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Het Verband" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
